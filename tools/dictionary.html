<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线词典 - 英汉汉英翻译</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 42px;
            color: #059669;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            font-size: 16px;
            color: #666;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: white;
            color: #059669;
            border: 2px solid #059669;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #059669;
            color: white;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }

        .search-box {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 18px 25px;
            font-size: 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .search-btn {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(5, 150, 105, 0.3);
        }

        .dictionary-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .dict-card {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dict-card:hover {
            border-color: #059669;
            box-shadow: 0 8px 24px rgba(5, 150, 105, 0.15);
            transform: translateY(-4px);
        }

        .dict-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .dict-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .dict-desc {
            font-size: 13px;
            color: #999;
        }

        .features {
            margin-top: 40px;
            background: linear-gradient(145deg, #ecfdf5 0%, #d1fae5 100%);
            border-radius: 20px;
            padding: 30px;
        }

        .features h3 {
            color: #047857;
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .feature-item {
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feature-item span {
            font-size: 16px;
            color: #047857;
        }

        .history {
            margin-top: 30px;
        }

        .history h3 {
            color: #047857;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-tag {
            background: white;
            color: #059669;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #059669;
        }

        .history-tag:hover {
            background: #059669;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 32px;
            }
            .input-group {
                flex-direction: column;
            }
            .search-btn {
                width: 100%;
            }
            .back-btn {
                position: relative;
                margin-bottom: 20px;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="location.href='../index.html'">← 返回</button>
        
        <div class="header">
            <h1>📚 在线词典</h1>
            <p>英汉汉英翻译 · 权威词典</p>
        </div>

        <div class="search-box">
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="输入要查询的单词或词组..." autofocus>
                <button class="search-btn" onclick="searchAll()">🔍 翻译</button>
            </div>
        </div>

        <div class="dictionary-options">
            <div class="dict-card" onclick="openDict('youdao')">
                <div class="dict-icon">📖</div>
                <div class="dict-name">有道词典</div>
                <div class="dict-desc">英汉汉英翻译</div>
            </div>

            <div class="dict-card" onclick="openDict('baidu')">
                <div class="dict-icon">🌐</div>
                <div class="dict-name">百度翻译</div>
                <div class="dict-desc">智能翻译</div>
            </div>

            <div class="dict-card" onclick="openDict('iciba')">
                <div class="dict-icon">💡</div>
                <div class="dict-name">金山词霸</div>
                <div class="dict-desc">专业词典</div>
            </div>

            <div class="dict-card" onclick="openDict('bing')">
                <div class="dict-icon">🔍</div>
                <div class="dict-name">必应词典</div>
                <div class="dict-desc">微软词典</div>
            </div>

            <div class="dict-card" onclick="openDict('google')">
                <div class="dict-icon">🌍</div>
                <div class="dict-name">谷歌翻译</div>
                <div class="dict-desc">多语种翻译</div>
            </div>

            <div class="dict-card" onclick="openDict('cnki')">
                <div class="dict-icon">📚</div>
                <div class="dict-name">CNKI翻译</div>
                <div class="dict-desc">学术翻译</div>
            </div>
        </div>

        <div class="features">
            <h3>✨ 支持功能</h3>
            <div class="feature-list">
                <div class="feature-item">
                    <span>📝</span>
                    <span>单词翻译</span>
                </div>
                <div class="feature-item">
                    <span>🌐</span>
                    <span>中英互译</span>
                </div>
                <div class="feature-item">
                    <span>🔊</span>
                    <span>语音朗读</span>
                </div>
                <div class="feature-item">
                    <span>📚</span>
                    <span>例句解析</span>
                </div>
                <div class="feature-item">
                    <span>🎯</span>
                    <span>词性标注</span>
                </div>
                <div class="feature-item">
                    <span>💾</span>
                    <span>学习记录</span>
                </div>
            </div>
        </div>

        <div class="history" id="historySection" style="display: none;">
            <h3>🕐 查询历史</h3>
            <div class="history-tags" id="historyTags"></div>
        </div>
    </div>

    <script>
        const dictUrls = {
            youdao: 'https://dict.youdao.com/search?q=',
            baidu: 'https://fanyi.baidu.com/#auto/zh/',
            iciba: 'https://www.iciba.com/word?word=',
            bing: 'https://cn.bing.com/dict/search?q=',
            google: 'https://translate.google.cn/?sl=auto&tl=zh-CN&text=',
            cnki: 'https://dict.cnki.net/dict_result.aspx?searchword='
        };

        const dictNames = {
            youdao: '有道词典',
            baidu: '百度翻译',
            iciba: '金山词霸',
            bing: '必应词典',
            google: '谷歌翻译',
            cnki: 'CNKI翻译'
        };

        let searchHistory = [];

        function getSearchQuery() {
            const input = document.getElementById('searchInput');
            return input.value.trim();
        }

        function openDict(dictType) {
            const query = getSearchQuery();
            
            if (!query) {
                alert('请输入要查询的单词或词组');
                return;
            }

            const url = dictUrls[dictType] + encodeURIComponent(query);
            window.open(url, '_blank');
            
            // 保存到历史记录
            saveToHistory(query);
        }

        function searchAll() {
            const query = getSearchQuery();
            
            if (!query) {
                alert('请输入要查询的单词或词组');
                return;
            }

            // 默认打开有道词典
            openDict('youdao');
        }

        function saveToHistory(query) {
            // 避免重复
            if (searchHistory.includes(query)) {
                return;
            }

            searchHistory.unshift(query);
            
            // 最多保留10条
            if (searchHistory.length > 10) {
                searchHistory = searchHistory.slice(0, 10);
            }

            // 保存到localStorage
            localStorage.setItem('dictionaryHistory', JSON.stringify(searchHistory));
            
            // 更新显示
            updateHistoryDisplay();
        }

        function loadHistory() {
            const saved = localStorage.getItem('dictionaryHistory');
            if (saved) {
                searchHistory = JSON.parse(saved);
                updateHistoryDisplay();
            }
        }

        function updateHistoryDisplay() {
            const historySection = document.getElementById('historySection');
            const historyTags = document.getElementById('historyTags');
            
            if (searchHistory.length === 0) {
                historySection.style.display = 'none';
                return;
            }

            historySection.style.display = 'block';
            historyTags.innerHTML = '';

            searchHistory.forEach(query => {
                const tag = document.createElement('div');
                tag.className = 'history-tag';
                tag.textContent = query;
                tag.onclick = function() {
                    document.getElementById('searchInput').value = query;
                };
                historyTags.appendChild(tag);
            });
        }

        // 回车键触发搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchAll();
            }
        });

        // 页面加载时读取历史记录
        window.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
