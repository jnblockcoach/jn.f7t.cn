<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大黄的工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', system-ui, sans-serif;
            background: linear-gradient(145deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
            line-height: 1.6;
        }

        .layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 2rem 1rem;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .hero {
            text-align: center;
            margin: 2rem 0 3rem 0;
            animation: fadeInUp 0.8s ease-out;
        }

        .dahuang-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .dahuang-logo span {
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e07a5f, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .dahuang-logo::before {
            content: "🐕";
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: #e74c3c;
            margin-bottom: 0.75rem;
            border-bottom: 3px solid rgba(231, 76, 60, 0.3);
            display: inline-block;
            padding-bottom: 0.25rem;
        }

        .subhead {
            font-size: 1.2rem;
            color: #8b5a2b;
            max-width: 700px;
            margin: 1rem auto 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            padding: 0.75rem 2rem;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .tool-section {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px -12px rgba(240, 138, 83, 0.2),
                        0 0 0 1px rgba(255,255,255,0.8) inset;
            border: 1px solid rgba(255,255,255,0.9);
            margin: 2rem 0 3rem 0;
            transition: all 0.3s ease;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #e07a5f;
            margin-bottom: 1.8rem;
            font-weight: 500;
        }

        .section-label span {
            background: #f59e0b;
            color: white;
            padding: 0.15rem 0.9rem;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .button-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
        }

        .button-grid button {
            background: white;
            border: none;
            padding: 1rem 2.2rem;
            font-size: 1.2rem;
            font-weight: 550;
            color: #d35400;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 18px -8px rgba(240, 138, 83, 0.25),
                        0 0 0 1px rgba(240, 138, 83, 0.1) inset;
            transition: all 0.2s ease;
            min-width: 180px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            backdrop-filter: blur(2px);
        }

        .button-grid button:hover {
            background: #fff8e1;
            transform: translateY(-3px);
            box-shadow: 0 16px 24px -10px #f59e0b;
        }

        .button-grid button:active {
            transform: translateY(0);
            transition: 0.05s;
        }

        .button-emoji {
            font-size: 1.4rem;
        }

        footer {
            text-align: center;
            color: #8b5a2b;
            font-size: 0.9rem;
            padding: 2rem 0 0.5rem;
            border-top: 1px solid rgba(240, 138, 83, 0.2);
            margin-top: 2rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .layout {
                padding: 1rem;
            }
            h1 {
                font-size: 2rem;
            }
            .button-grid button {
                width: 100%;
                max-width: 280px;
            }
            .subhead {
                font-size: 1rem;
                padding: 0.5rem 1rem;
            }
            .tool-section {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="hero">
            <div class="dahuang-logo">
                <span>大黄</span>
            </div>
            <h1>工作台</h1>
            <div class="subhead">
                🐕 大黄 · 忠诚 · 聪明
            </div>
        </div>

        <div class="tool-section">
            <div class="section-label">
                🌤 天气服务 <span>WEATHER</span>
            </div>
            <div class="button-grid">
                <button onclick="location.href='weather/weekly.html'">
                    <span class="button-emoji">📊</span>
                    <span>北京周报</span>
                </button>
                <button onclick="location.href='weather/index.html'">
                    <span class="button-emoji">🌡</span>
                    <span>今日天气</span>
                </button>
            </div>
        </div>

        <div class="tool-section">
            <div class="section-label">
                📰 新闻媒体 <span>NEWS</span>
            </div>
            <div class="button-grid">
                <button onclick="location.href='paper/newspapers.md'">
                    <span class="button-emoji">📋</span>
                    <span>网站清单</span>
                </button>
                <button onclick="location.href='paper/renminribao.html'">
                    <span class="button-emoji">🇨🇳</span>
                    <span>人民日报</span>
                </button>
                <button onclick="location.href='paper/xinhuashe.html'">
                    <span class="button-emoji">🎤</span>
                    <span>新华社</span>
                </button>
            </div>
        </div>

        <div class="tool-section">
            <div class="section-label">
                🛠 开发工具 <span>TOOLS</span>
            </div>
            <div class="button-grid">
                <button onclick="location.href='memory/2026-03-22.md'">
                    <span class="button-emoji">🧠</span>
                    <span>今日记忆</span>
                </button>
                <button onclick="location.href='AGENTS.md'">
                    <span class="button-emoji">📋</span>
                    <span>工作配置</span>
                </button>
                <button onclick="location.href='tools/file-manager.html'">
                    <span class="button-emoji">📁</span>
                    <span>文件整理</span>
                </button>
            </div>
        </div>

        <div class="tool-section">
            <div class="section-label">
                📚 学习工具 <span>LEARNING</span>
            </div>
            <div class="button-grid">
                <button onclick="location.href='tools/dictionary.html'">
                    <span class="button-emoji">📚</span>
                    <span>在线词典</span>
                </button>
            </div>
        </div>

        <footer>
            <p>🐕 大黄 · 忠诚为您服务</p>
            <p style="margin-top: 0.5rem; font-size: 0.8rem;">© 2026 Jn & OpenClaw</p>
        </footer>
    </div>
</body>
</html>
