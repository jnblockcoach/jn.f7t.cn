<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日天气 - 北京</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 18px;
        }

        .weather-card {
            display: none;
        }

        .current-weather {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
        }

        .temp-large {
            font-size: 72px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }

        .weather-icon {
            font-size: 64px;
            margin: 10px 0;
        }

        .weather-desc {
            font-size: 24px;
            color: #666;
            margin-bottom: 15px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .hourly-forecast {
            margin-top: 30px;
        }

        .hourly-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .hourly-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .hourly-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            min-width: 80px;
            text-align: center;
        }

        .hourly-time {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .hourly-temp {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .hourly-icon {
            font-size: 24px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
        }

        .last-updated {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ 今日天气</h1>
            <p>北京市</p>
        </div>

        <div id="loading" class="loading">
            <div style="font-size: 48px; margin-bottom: 20px;">⏳</div>
            正在获取天气数据...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="weather-card" class="weather-card">
            <div class="current-weather">
                <div id="weather-icon" class="weather-icon"></div>
                <div id="weather-desc" class="weather-desc"></div>
                <div id="temp-large" class="temp-large"></div>
                <p id="temp-range" style="color: #666; font-size: 16px;"></p>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <div class="detail-label">体感温度</div>
                    <div id="feels-like" class="detail-value">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">湿度</div>
                    <div id="humidity" class="detail-value">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">风速</div>
                    <div id="wind" class="detail-value">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">降水概率</div>
                    <div id="precip-prob" class="detail-value">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">紫外线指数</div>
                    <div id="uv" class="detail-value">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">日照</div>
                    <div id="sunshine" class="detail-value">--</div>
                </div>
            </div>

            <div class="hourly-forecast">
                <div class="hourly-title">⏰ 未来几小时预报</div>
                <div id="hourly-container" class="hourly-container"></div>
            </div>

            <div style="text-align: center;">
                <button class="refresh-btn" onclick="fetchWeather()">🔄 刷新天气</button>
            </div>

            <div id="last-updated" class="last-updated"></div>
        </div>
    </div>

    <script>
        const WEATHER_ICONS = {
            'sunny': '☀️',
            'partly_cloudy': '⛅',
            'cloudy': '☁️',
            'overcast': '☁️',
            'rain': '🌧️',
            'light_rain': '🌦️',
            'moderate_rain': '🌧️',
            'heavy_rain': '🌧️',
            'thunderstorm': '⛈️',
            'snow': '❄️',
            'light_snow': '🌨️',
            'fog': '🌫️',
            'mist': '🌫️',
            '阴': '☁️',
            '晴': '☀️',
            '多云': '⛅',
            '雨': '🌧️',
            '雪': '❄️',
            '雾': '🌫️'
        };

        const WEATHER_NAMES = {
            '阴': '阴天',
            '晴': '晴朗',
            '多云': '多云',
            '雨': '下雨',
            '雪': '下雪',
            '雾': '有雾'
        };

        async function fetchWeather() {
            showLoading();
            
            try {
                const url = 'https://api.open-meteo.com/v1/forecast?latitude=39.9042&longitude=116.4074&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,cloud_cover,wind_speed_10m&hourly=temperature_2m,relative_humidity_2m,precipitation_probability,precipitation,weather_code,cloud_cover,wind_speed_10m&daily=uv_index_max,sunrise,sunset&forecast_days=1&timezone=Asia%2FShanghai';
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('获取天气数据失败');
                }
                
                const data = await response.json();
                displayWeather(data);
            } catch (error) {
                showError(error.message);
            }
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('weather-card').style.display = 'none';
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerHTML = `
                <div style="font-size: 48px; margin-bottom: 20px;">❌</div>
                ${message}
                <br><br>
                <button class="refresh-btn" onclick="fetchWeather()">🔄 重试</button>
            `;
            document.getElementById('weather-card').style.display = 'none';
        }

        function getWeatherInfo(code) {
            const weatherCodes = {
                0: { name: '晴', icon: '☀️' },
                1: { name: '晴', icon: '☀️' },
                2: { name: '多云', icon: '⛅' },
                3: { name: '阴', icon: '☁️' },
                45: { name: '雾', icon: '🌫️' },
                48: { name: '雾', icon: '🌫️' },
                51: { name: '小雨', icon: '🌦️' },
                53: { name: '小雨', icon: '🌦️' },
                55: { name: '小雨', icon: '🌦️' },
                61: { name: '雨', icon: '🌧️' },
                63: { name: '中雨', icon: '🌧️' },
                65: { name: '大雨', icon: '🌧️' },
                71: { name: '雪', icon: '❄️' },
                73: { name: '中雪', icon: '❄️' },
                75: { name: '大雪', icon: '❄️' },
                80: { name: '小雨', icon: '🌦️' },
                81: { name: '中雨', icon: '🌧️' },
                82: { name: '大雨', icon: '🌧️' },
                95: { name: '雷雨', icon: '⛈️' },
                96: { name: '雷雨', icon: '⛈️' },
                99: { name: '雷雨', icon: '⛈️' }
            };
            
            return weatherCodes[code] || { name: '未知', icon: '❓' };
        }

        function displayWeather(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            const weatherCard = document.getElementById('weather-card');
            weatherCard.style.display = 'block';
            
            // Current weather
            const current = data.current;
            const daily = data.daily;
            const hourly = data.hourly;
            
            const weatherInfo = getWeatherInfo(current.weather_code);
            
            document.getElementById('weather-icon').textContent = weatherInfo.icon;
            document.getElementById('weather-desc').textContent = weatherInfo.name;
            document.getElementById('temp-large').textContent = `${Math.round(current.temperature_2m)}°C`;
            
            // Find min/max temp from hourly
            const todayHourly = hourly.time.filter((t, i) => i < 24);
            const temps = todayHourly.map((_, i) => hourly.temperature_2m[i]);
            const minTemp = Math.round(Math.min(...temps));
            const maxTemp = Math.round(Math.max(...temps));
            
            document.getElementById('temp-range').textContent = `${minTemp}°C / ${maxTemp}°C`;
            
            // Details
            document.getElementById('feels-like').textContent = `${Math.round(current.apparent_temperature)}°C`;
            document.getElementById('humidity').textContent = `${current.relative_humidity_2m}%`;
            document.getElementById('wind').textContent = `${Math.round(current.wind_speed_10m)} km/h`;
            
            // Find current hour index for precipitation
            const now = new Date();
            const currentHourIndex = hourly.time.findIndex(t => {
                const hourlyTime = new Date(t);
                return hourlyTime.getHours() === now.getHours();
            });
            
            if (currentHourIndex !== -1) {
                document.getElementById('precip-prob').textContent = 
                    `${hourly.precipitation_probability[currentHourIndex]}%`;
            }
            
            document.getElementById('uv').textContent = daily.uv_index_max[0] || '--';
            
            const sunrise = new Date(daily.sunrise[0]).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const sunset = new Date(daily.sunset[0]).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('sunshine').textContent = `${sunrise} - ${sunset}`;
            
            // Hourly forecast (next 8 hours)
            const hourlyContainer = document.getElementById('hourly-container');
            hourlyContainer.innerHTML = '';
            
            const startIndex = currentHourIndex !== -1 ? currentHourIndex : 0;
            
            for (let i = 0; i < 8 && startIndex + i < hourly.time.length; i++) {
                const idx = startIndex + i;
                const time = new Date(hourly.time[idx]);
                const hourInfo = getWeatherInfo(hourly.weather_code[idx]);
                
                const hourlyItem = document.createElement('div');
                hourlyItem.className = 'hourly-item';
                hourlyItem.innerHTML = `
                    <div class="hourly-time">${time.getHours()}:00</div>
                    <div class="hourly-icon">${hourInfo.icon}</div>
                    <div class="hourly-temp-temp">${Math.round(hourly.temperature_2m[idx])}°C</div>
                `;
                hourlyContainer.appendChild(hourlyItem);
            }
            
            // Last updated
            const updateTime = new Date().toLocaleString('zh-CN', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('last-updated').textContent = `最后更新: ${updateTime}`;
        }

        // Auto fetch on page load
        window.addEventListener('DOMContentLoaded', fetchWeather);
        
        // Auto refresh every 15 minutes
        setInterval(fetchWeather, 15 * 60 * 1000);
    </script>
</body>
</html>
